<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEO — Contador de Check-ins</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Wix+Madefor+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:          #111317;
      --surface:     #16191f;
      --surface2:    #1c2035;
      --border:      #252b42;
      --blue-500:    #002ef7;
      --blue-400:    #3358f9;
      --blue-300:    #5473fa;
      --text:        #ffffff;
      --text-secondary: #a5a7b0;
      --text-muted:  #75777d;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Wix Madefor Display', sans-serif;
      font-size: 14px;
    }

    /* Nav */
    .nav {
      background: var(--blue-500);
      padding: 0 24px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .nav-logo {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      text-decoration: none;
    }
    .nav-link {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
    }
    .nav-link:hover { color: #fff; }
    .nav-link.active { color: #fff; font-weight: 700; }

    .page { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    h1 {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 28px;
      margin-bottom: 6px;
    }
    .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 28px; }

    /* Upload card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }
    .card-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .upload-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .file-wrap {
      flex: 1; min-width: 200px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-secondary);
      cursor: pointer;
    }
    .file-wrap input[type="file"] { display: none; }
    .file-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn {
      background: var(--blue-500);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 20px;
      font-family: 'Wix Madefor Display', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      height: 42px;
      white-space: nowrap;
    }
    .btn:hover { background: var(--blue-400); }

    /* Meta bar */
    .meta-bar {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .meta-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
    }
    .meta-pill .label {
      font-size: 10px; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 2px;
    }
    .meta-pill .value {
      font-family: 'Sora', sans-serif;
      font-size: 15px; font-weight: 700;
    }

    /* Search + filters */
    .toolbar {
      display: flex; gap: 10px; align-items: center;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .search-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-family: 'Wix Madefor Display', sans-serif;
      font-size: 13px;
      width: 260px;
      outline: none;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--blue-400); }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      color: var(--text-secondary);
      font-family: 'Wix Madefor Display', sans-serif;
      font-size: 12px; font-weight: 600;
      cursor: pointer;
    }
    .filter-btn.active {
      background: var(--surface2);
      border-color: var(--blue-400);
      color: var(--text);
    }

    /* Table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: var(--surface2); border-bottom: 1px solid var(--border); }
    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 11px; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }

    .rank { color: var(--text-muted); font-size: 12px; width: 32px; }
    .user-name { font-weight: 600; }

    /* Progress bar */
    .progress-wrap {
      display: flex; align-items: center; gap: 10px;
    }
    .progress-track {
      flex: 1; height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      min-width: 80px;
    }
    .progress-fill {
      height: 100%; border-radius: 99px;
      transition: width .3s;
    }
    .progress-label { font-size: 12px; font-weight: 700; min-width: 28px; text-align: right; }

    /* Status badges */
    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 99px;
      font-size: 11px; font-weight: 700;
      white-space: nowrap;
    }
    .badge-goal    { background: #7f1d1d22; color: #f87171; border: 1px solid #f8717144; }
    .badge-danger  { background: #7c2d1222; color: #fb923c; border: 1px solid #fb923c44; }
    .badge-warning { background: #71350022; color: #fbbf24; border: 1px solid #fbbf2444; }
    .badge-ok      { background: #14532d22; color: #4ade80; border: 1px solid #4ade8044; }

    .last-visit { color: var(--text-muted); font-size: 12px; }

    /* Error */
    .error-box {
      background: #7f1d1d33;
      border: 1px solid #f8717155;
      border-radius: 10px;
      padding: 12px 16px;
      color: #f87171;
      margin-bottom: 16px;
      display: none;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <nav class="nav">
    <a class="nav-logo" href="/">NEO</a>
    <a class="nav-link" href="/">Panel de Ocupación</a>
    <a class="nav-link active" href="/checkins">Contador de Check-ins</a>
  </nav>

  <div class="page">
    <h1>Contador de Check-ins</h1>
    <p class="subtitle">Subí el reporte de accesos del período y mirá quién está cerca de llegar a 12 visitas.</p>

    <div class="card">
      <div class="card-label">Cargar reporte de accesos (.xlsx)</div>
      <div class="upload-row">
        <label class="file-wrap" for="fileInput">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
          <span class="file-name" id="fileName">Seleccionar archivo</span>
          <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="onFileChange(this)">
        </label>
        <button class="btn" onclick="analyze()">🔍 Analizar</button>
      </div>
    </div>

    <div class="error-box" id="errBox"></div>

    <div id="results" class="hidden">
      <div class="meta-bar" id="metaBar"></div>

      <div class="toolbar">
        <input class="search-input" type="text" id="searchInput" placeholder="Buscar usuario..." oninput="renderTable()">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">Todos</button>
        <button class="filter-btn" data-filter="goal" onclick="setFilter('goal', this)">🏆 Meta (≥12)</button>
        <button class="filter-btn" data-filter="danger" onclick="setFilter('danger', this)">🔴 Cerca (10-11)</button>
        <button class="filter-btn" data-filter="warning" onclick="setFilter('warning', this)">🟡 Avanzando (7-9)</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Usuario</th>
              <th>Check-ins</th>
              <th style="min-width:180px">Progreso hacia 12</th>
              <th>Estado</th>
              <th>Última visita</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let allData = null;
    let currentFilter = 'all';

    function onFileChange(input) {
      document.getElementById('fileName').textContent = input.files[0]?.name || 'Seleccionar archivo';
    }

    async function analyze() {
      const file = document.getElementById('fileInput').files[0];
      if (!file) { showErr('Seleccioná un archivo primero.'); return; }

      const fd = new FormData();
      fd.append('file', file);

      try {
        const res  = await fetch('/upload-checkins', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok || data.error) { showErr(data.error || 'Error al procesar'); return; }
        allData = data;
        render(data);
      } catch(e) { showErr('Error de red: ' + e.message); }
    }

    function showErr(msg) {
      const el = document.getElementById('errBox');
      el.textContent = msg; el.style.display = 'block';
    }

    function getStatus(count, goal) {
      if (count >= goal)      return { label: `🏆 Meta alcanzada`, cls: 'badge-goal' };
      if (count >= goal - 2)  return { label: `🔴 Faltan ${goal - count}`, cls: 'badge-danger' };
      if (count >= goal - 5)  return { label: `🟡 Faltan ${goal - count}`, cls: 'badge-warning' };
      return                         { label: `Faltan ${goal - count}`, cls: 'badge-ok' };
    }

    function getProgressColor(count, goal) {
      const pct = count / goal;
      if (pct >= 1)    return '#f87171';
      if (pct >= 0.83) return '#fb923c';
      if (pct >= 0.58) return '#fbbf24';
      return '#4ade80';
    }

    function matchesFilter(count, goal) {
      if (currentFilter === 'all')     return true;
      if (currentFilter === 'goal')    return count >= goal;
      if (currentFilter === 'danger')  return count >= goal - 2 && count < goal;
      if (currentFilter === 'warning') return count >= goal - 5 && count < goal - 2;
      return true;
    }

    function render(data) {
      document.getElementById('errBox').style.display = 'none';
      document.getElementById('results').classList.remove('hidden');

      document.getElementById('metaBar').innerHTML = [
        ['Período', `${data.date_from} → ${data.date_to}`],
        ['Días', data.total_days],
        ['Usuarios', data.total_users],
        ['Meta', `${data.goal} check-ins`],
      ].map(([l,v]) => `<div class="meta-pill"><div class="label">${l}</div><div class="value">${v}</div></div>`).join('');

      renderTable();
    }

    function renderTable() {
      if (!allData) return;
      const search = document.getElementById('searchInput').value.toLowerCase();
      const goal   = allData.goal;

      const filtered = allData.users.filter(u => {
        const nameMatch = u.nombre.toLowerCase().includes(search);
        const filterMatch = matchesFilter(u.total, goal);
        return nameMatch && filterMatch;
      });

      document.getElementById('tableBody').innerHTML = filtered.map((u, i) => {
        const pct    = Math.min(100, Math.round((u.total / goal) * 100));
        const color  = getProgressColor(u.total, goal);
        const status = getStatus(u.total, goal);
        return `<tr>
          <td class="rank">${i + 1}</td>
          <td class="user-name">${u.nombre}</td>
          <td style="font-family:'Sora',sans-serif;font-weight:700;font-size:15px">${u.total}</td>
          <td>
            <div class="progress-wrap">
              <div class="progress-track">
                <div class="progress-fill" style="width:${pct}%;background:${color}"></div>
              </div>
              <span class="progress-label" style="color:${color}">${u.total}/${goal}</span>
            </div>
          </td>
          <td><span class="badge ${status.cls}">${status.label}</span></td>
          <td class="last-visit">${u.last_visit}</td>
        </tr>`;
      }).join('');
    }

    function setFilter(name, btn) {
      currentFilter = name;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTable();
    }
  </script>
</body>
</html>
